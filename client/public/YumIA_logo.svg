<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <!-- Dark background gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#0F0E1A"/>
      <stop offset="100%" stop-color="#07070E"/>
    </radialGradient>
    <!-- Gold gradient for main lines -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8CB94"/>
      <stop offset="50%" stop-color="#C9A96E"/>
      <stop offset="100%" stop-color="#9A7840"/>
    </linearGradient>
    <!-- Gold glow filter -->
    <filter id="goldGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="1 0.7 0 0 0.1  0.8 0.6 0 0 0.05  0 0 0 0 0  0 0 0 0.6 0" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Subtle glow for dots -->
    <filter id="dotGlow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="500" height="500" fill="url(#bgGrad)" rx="0"/>

  <!-- Subtle gold vignette glow behind logo -->
  <ellipse cx="250" cy="190" rx="140" ry="130" fill="#C9A96E" opacity="0.06" filter="url(#goldGlow)"/>

  <!-- ═══════════════════════════════════════════
       CIRCUIT HEART — adapted to gold palette
       Heart geometry: two arcs meeting at bottom point (250, 330)
       Left lobe: center ~(175, 150), Right lobe: center ~(325, 150)
  ═══════════════════════════════════════════ -->

  <!-- Main heart outline (circuit-style) using path segments -->
  <!-- Left side of heart with circuit lines -->
  <g filter="url(#goldGlow)" opacity="0.95">

    <!-- Outer heart shape as clip reference - not shown, used conceptually -->

    <!-- Main left circuit lines - horizontal/vertical segments forming left side -->
    <!-- Top left diagonal entry -->
    <path d="M 175 100 L 165 100 L 155 110 L 155 135" 
          fill="none" stroke="url(#goldGrad)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Left lobe curve segments (circuit style) -->
    <path d="M 155 135 L 155 155 L 145 165 L 145 185 L 165 205 L 185 225 L 195 235" 
          fill="none" stroke="url(#goldGrad)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Center-left descent to point -->
    <path d="M 195 235 L 205 245 L 220 262 L 250 300" 
          fill="none" stroke="url(#goldGrad)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Top left parallel line (inner) -->
    <path d="M 190 105 L 180 105 L 175 110 L 175 140 L 185 150 L 185 180 L 205 200 L 215 210 L 225 222 L 240 240 L 250 300"
          fill="none" stroke="#C9A96E" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>

    <!-- Top horizontal bar left -->
    <path d="M 175 100 L 205 100 L 215 110" 
          fill="none" stroke="url(#goldGrad)" stroke-width="4" stroke-linecap="round"/>

    <!-- Second horizontal bar left area -->
    <path d="M 215 110 L 225 110 L 235 120 L 235 140" 
          fill="none" stroke="url(#goldGrad)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 235 140 L 235 150 L 225 160 L 225 175 L 235 185 L 235 200 L 245 210"
          fill="none" stroke="url(#goldGrad)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>

    <!-- RIGHT SIDE of heart -->
    <!-- Top right entry -->
    <path d="M 325 100 L 335 100 L 345 110 L 345 135" 
          fill="none" stroke="url(#goldGrad)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Right lobe segments -->
    <path d="M 345 135 L 345 155 L 355 165 L 355 185 L 335 205 L 315 225 L 305 235" 
          fill="none" stroke="url(#goldGrad)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Center-right descent to point -->
    <path d="M 305 235 L 295 245 L 280 262 L 250 300" 
          fill="none" stroke="url(#goldGrad)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Top right parallel (inner) -->
    <path d="M 310 105 L 320 105 L 325 110 L 325 140 L 315 150 L 315 180 L 295 200 L 285 210 L 275 222 L 260 240 L 250 300"
          fill="none" stroke="#C9A96E" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>

    <!-- Top horizontal bar right -->
    <path d="M 325 100 L 295 100 L 285 110" 
          fill="none" stroke="url(#goldGrad)" stroke-width="4" stroke-linecap="round"/>
    <path d="M 285 110 L 275 110 L 265 120 L 265 140" 
          fill="none" stroke="url(#goldGrad)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 265 140 L 265 150 L 275 160 L 275 175 L 265 185 L 265 200 L 255 210"
          fill="none" stroke="url(#goldGrad)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>

    <!-- Right side vertical bars (like the original design) -->
    <path d="M 360 140 L 360 195" stroke="url(#goldGrad)" stroke-width="4" stroke-linecap="round" fill="none"/>
    <path d="M 370 148 L 370 188" stroke="#C9A96E" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.6"/>
    <path d="M 380 155 L 380 182" stroke="#C9A96E" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.4"/>

    <!-- Left side horizontal marks -->
    <path d="M 140 155 L 152 155" stroke="#E8CB94" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.5"/>
    <path d="M 140 168 L 148 168" stroke="#C9A96E" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.4"/>

    <!-- Bottom V accent (brighter gold) -->
    <path d="M 240 283 L 250 300 L 260 283"
          fill="none" stroke="#E8CB94" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Circuit node dots — gold with glow -->
  <g filter="url(#dotGlow)">
    <!-- Left side nodes -->
    <circle cx="155" cy="100" r="5" fill="#E8CB94" opacity="0.9"/>
    <circle cx="155" cy="165" r="4" fill="#C9A96E" opacity="0.85"/>
    <circle cx="155" cy="195" r="3" fill="#C9A96E" opacity="0.6"/>
    <circle cx="175" cy="100" r="4.5" fill="#E8CB94" opacity="0.85"/>
    <circle cx="235" cy="120" r="4" fill="#E8CB94" opacity="0.9"/>
    <circle cx="235" cy="150" r="3.5" fill="#C9A96E" opacity="0.7"/>
    <circle cx="215" cy="110" r="3" fill="#C9A96E" opacity="0.6"/>
    <!-- Left floating dots (like original) -->
    <circle cx="130" cy="128" r="3.5" fill="#C9A96E" opacity="0.5"/>
    <circle cx="137" cy="143" r="2.5" fill="#C9A96E" opacity="0.4"/>
    <circle cx="122" cy="150" r="2" fill="#C9A96E" opacity="0.3"/>

    <!-- Right side nodes -->
    <circle cx="345" cy="100" r="5" fill="#E8CB94" opacity="0.9"/>
    <circle cx="345" cy="165" r="4" fill="#C9A96E" opacity="0.85"/>
    <circle cx="345" cy="195" r="3" fill="#C9A96E" opacity="0.6"/>
    <circle cx="325" cy="100" r="4.5" fill="#E8CB94" opacity="0.85"/>
    <circle cx="265" cy="120" r="4" fill="#E8CB94" opacity="0.9"/>
    <circle cx="265" cy="150" r="3.5" fill="#C9A96E" opacity="0.7"/>
    <circle cx="285" cy="110" r="3" fill="#C9A96E" opacity="0.6"/>
    <!-- Right floating dots -->
    <circle cx="370" cy="128" r="3.5" fill="#C9A96E" opacity="0.5"/>
    <circle cx="363" cy="143" r="2.5" fill="#C9A96E" opacity="0.4"/>
    <circle cx="378" cy="150" r="2" fill="#C9A96E" opacity="0.3"/>
    <!-- Top center dots -->
    <circle cx="250" cy="110" r="3" fill="#E8CB94" opacity="0.6"/>
    <circle cx="250" cy="125" r="2.5" fill="#C9A96E" opacity="0.4"/>
  </g>

  <!-- Empty circle nodes (like original) -->
  <g filter="url(#dotGlow)">
    <circle cx="155" cy="135" r="5" fill="none" stroke="#C9A96E" stroke-width="2" opacity="0.7"/>
    <circle cx="235" cy="185" r="4.5" fill="none" stroke="#E8CB94" stroke-width="2" opacity="0.8"/>
    <circle cx="265" cy="185" r="4.5" fill="none" stroke="#E8CB94" stroke-width="2" opacity="0.8"/>
    <circle cx="345" cy="135" r="5" fill="none" stroke="#C9A96E" stroke-width="2" opacity="0.7"/>
    <circle cx="355" cy="168" r="3.5" fill="none" stroke="#C9A96E" stroke-width="1.5" opacity="0.55"/>
  </g>

  <!-- ═══════════════════════════════════════════
       WORDMARK — YUMIA
  ═══════════════════════════════════════════ -->
  <text
    x="250"
    y="395"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="64"
    font-weight="700"
    letter-spacing="6"
    fill="url(#goldGrad)"
  >YUMIA</text>

  <!-- Subtle tagline -->
  <text
    x="250"
    y="425"
    text-anchor="middle"
    font-family="Arial, sans-serif"
    font-size="13"
    font-weight="400"
    letter-spacing="4"
    fill="#6A6660"
  >INFRAESTRUTURA COM IA</text>
</svg>
