<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background with subtle gradient -->
  <defs>
    <linearGradient id="backgroundGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="primaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="secondaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f97316;stop-opacity:1" />
    </linearGradient>
    
    <!-- Subtle pattern -->
    <pattern id="dots" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="1" fill="#cbd5e1" opacity="0.3"/>
    </pattern>
    
    <!-- Glow effect -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="800" height="600" fill="url(#backgroundGradient)"/>
  <rect width="800" height="600" fill="url(#dots)"/>
  
  <!-- Central brain/AI concept -->
  <g transform="translate(400, 300)">
    <!-- Main AI brain -->
    <circle cx="0" cy="0" r="80" fill="url(#primaryGradient)" opacity="0.9" filter="url(#glow)"/>
    <circle cx="0" cy="0" r="60" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.8"/>
    <circle cx="0" cy="0" r="40" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.6"/>
    
    <!-- Neural network connections -->
    <g opacity="0.8">
      <!-- Connection lines -->
      <line x1="0" y1="0" x2="-120" y2="-80" stroke="url(#primaryGradient)" stroke-width="3"/>
      <line x1="0" y1="0" x2="120" y2="-80" stroke="url(#secondaryGradient)" stroke-width="3"/>
      <line x1="0" y1="0" x2="-120" y2="80" stroke="url(#accentGradient)" stroke-width="3"/>
      <line x1="0" y1="0" x2="120" y2="80" stroke="url(#primaryGradient)" stroke-width="3"/>
      <line x1="0" y1="0" x2="0" y2="-120" stroke="url(#secondaryGradient)" stroke-width="3"/>
      <line x1="0" y1="0" x2="0" y2="120" stroke="url(#accentGradient)" stroke-width="3"/>
      
      <!-- Nodes -->
      <circle cx="-120" cy="-80" r="25" fill="url(#primaryGradient)" opacity="0.9"/>
      <circle cx="120" cy="-80" r="25" fill="url(#secondaryGradient)" opacity="0.9"/>
      <circle cx="-120" cy="80" r="25" fill="url(#accentGradient)" opacity="0.9"/>
      <circle cx="120" cy="80" r="25" fill="url(#primaryGradient)" opacity="0.9"/>
      <circle cx="0" cy="-120" r="25" fill="url(#secondaryGradient)" opacity="0.9"/>
      <circle cx="0" cy="120" r="25" fill="url(#accentGradient)" opacity="0.9"/>
    </g>
    
    <!-- AI symbol in center -->
    <text x="0" y="8" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">AI</text>
  </g>
  
  <!-- Floating methodology panels -->
  <!-- Diagnóstico -->
  <g transform="translate(150, 150)">
    <rect x="0" y="0" width="180" height="100" rx="15" fill="#ffffff" stroke="url(#primaryGradient)" stroke-width="2" opacity="0.95"/>
    <rect x="10" y="10" width="160" height="20" rx="5" fill="url(#primaryGradient)"/>
    <text x="15" y="25" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">1. DIAGNÓSTICO</text>
    
    <text x="15" y="45" font-family="Arial, sans-serif" font-size="10" fill="#374151">• Análise BPMN</text>
    <text x="15" y="58" font-family="Arial, sans-serif" font-size="10" fill="#374151">• Identificação de gargalos</text>
    <text x="15" y="71" font-family="Arial, sans-serif" font-size="10" fill="#374151">• Cálculo de ROI</text>
    <text x="15" y="84" font-family="Arial, sans-serif" font-size="10" fill="#374151">• Mapeamento de processos</text>
    
    <!-- Icon -->
    <circle cx="150" cy="25" r="8" fill="url(#primaryGradient)"/>
    <path d="M 147 22 L 149 24 L 153 20" stroke="#ffffff" stroke-width="1.5" fill="none"/>
  </g>
  
  <!-- Implementação -->
  <g transform="translate(470, 150)">
    <rect x="0" y="0" width="180" height="100" rx="15" fill="#ffffff" stroke="url(#secondaryGradient)" stroke-width="2" opacity="0.95"/>
    <rect x="10" y="10" width="160" height="20" rx="5" fill="url(#secondaryGradient)"/>
    <text x="15" y="25" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">2. IMPLEMENTAÇÃO</text>
    
    <text x="15" y="45" font-family="Arial, sans-serif" font-size="10" fill="#374151">• Desenvolvimento n8n</text>
    <text x="15" y="58" font-family="Arial, sans-serif" font-size="10" fill="#374151">• Integração Make.com</text>
    <text x="15" y="71" font-family="Arial, sans-serif" font-size="10" fill="#374151">• APIs de LLMs</text>
    <text x="15" y="84" font-family="Arial, sans-serif" font-size="10" fill="#374151">• Automação personalizada</text>
    
    <!-- Icon -->
    <circle cx="150" cy="25" r="8" fill="url(#secondaryGradient)"/>
    <rect x="147" y="22" width="6" height="6" fill="#ffffff"/>
  </g>
  
  <!-- Acompanhamento -->
  <g transform="translate(310, 450)">
    <rect x="0" y="0" width="180" height="100" rx="15" fill="#ffffff" stroke="url(#accentGradient)" stroke-width="2" opacity="0.95"/>
    <rect x="10" y="10" width="160" height="20" rx="5" fill="url(#accentGradient)"/>
    <text x="15" y="25" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff">3. ACOMPANHAMENTO</text>
    
    <text x="15" y="45" font-family="Arial, sans-serif" font-size="10" fill="#374151">• Monitoramento 24/7</text>
    <text x="15" y="58" font-family="Arial, sans-serif" font-size="10" fill="#374151">• Otimizações contínuas</text>
    <text x="15" y="71" font-family="Arial, sans-serif" font-size="10" fill="#374151">• Relatórios de performance</text>
    <text x="15" y="84" font-family="Arial, sans-serif" font-size="10" fill="#374151">• Suporte especializado</text>
    
    <!-- Icon -->
    <circle cx="150" cy="25" r="8" fill="url(#accentGradient)"/>
    <circle cx="150" cy="25" r="4" fill="#ffffff"/>
  </g>
  
  <!-- Performance metrics -->
  <g transform="translate(50, 350)">
    <rect x="0" y="0" width="120" height="80" rx="10" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" opacity="0.95"/>
    <text x="10" y="20" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#10b981">+300%</text>
    <text x="10" y="35" font-family="Arial, sans-serif" font-size="10" fill="#6b7280">ROI Médio</text>
    
    <text x="10" y="55" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0ea5e9">-50%</text>
    <text x="10" y="68" font-family="Arial, sans-serif" font-size="10" fill="#6b7280">Tempo de Processos</text>
  </g>
  
  <g transform="translate(630, 350)">
    <rect x="0" y="0" width="120" height="80" rx="10" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" opacity="0.95"/>
    <text x="10" y="20" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#f59e0b">98%</text>
    <text x="10" y="35" font-family="Arial, sans-serif" font-size="10" fill="#6b7280">Satisfação</text>
    
    <text x="10" y="55" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#10b981">50+</text>
    <text x="10" y="68" font-family="Arial, sans-serif" font-size="10" fill="#6b7280">Projetos Ativos</text>
  </g>
  
  <!-- Connecting arrows -->
  <g opacity="0.6">
    <path d="M 330 200 Q 370 250 330 300" stroke="url(#primaryGradient)" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
    <path d="M 470 200 Q 430 250 470 300" stroke="url(#secondaryGradient)" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  </g>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="url(#primaryGradient)"/>
    </marker>
  </defs>
  
  <!-- Floating particles -->
  <g opacity="0.5">
    <circle cx="100" cy="100" r="3" fill="url(#primaryGradient)"/>
    <circle cx="700" cy="120" r="2" fill="url(#secondaryGradient)"/>
    <circle cx="750" cy="500" r="4" fill="url(#accentGradient)"/>
    <circle cx="80" cy="500" r="2" fill="url(#primaryGradient)"/>
    <circle cx="720" cy="280" r="3" fill="url(#secondaryGradient)"/>
  </g>
</svg>