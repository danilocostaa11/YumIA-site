<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="600" fill="#f8fafc"/>
  
  <!-- YumIA Branding Elements -->
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#0ea5e9" text-anchor="middle">YumIA AI Dashboard</text>
  
  <!-- Grid pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#e2e8f0" stroke-width="0.5"/>
    </pattern>
    
    <!-- Gradients -->
    <linearGradient id="primaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="secondaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f97316;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="800" height="600" fill="url(#grid)"/>
  
  <!-- Main computer/dashboard -->
  <rect x="150" y="100" width="500" height="300" rx="20" fill="#1f2937" stroke="#374151" stroke-width="2"/>
  <rect x="170" y="120" width="460" height="260" rx="10" fill="#111827"/>
  
  <!-- Eco emIA methodology indicators -->
  <rect x="175" y="125" width="150" height="25" rx="5" fill="#0ea5e9" opacity="0.9"/>
  <text x="185" y="142" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">1. Diagnóstico</text>
  
  <rect x="335" y="125" width="150" height="25" rx="5" fill="#10b981" opacity="0.9"/>
  <text x="345" y="142" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">2. Implementação</text>
  
  <rect x="495" y="125" width="130" height="25" rx="5" fill="#f59e0b" opacity="0.9"/>
  <text x="505" y="142" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">3. Acompanhamento</text>
  
  <!-- Screen content - Dashboard -->
  <rect x="180" y="130" width="200" height="120" rx="8" fill="url(#primaryGradient)" opacity="0.9"/>
  <rect x="190" y="140" width="180" height="20" rx="4" fill="#ffffff" opacity="0.3"/>
  <rect x="190" y="170" width="120" height="15" rx="3" fill="#ffffff" opacity="0.6"/>
  <rect x="190" y="195" width="80" height="15" rx="3" fill="#ffffff" opacity="0.6"/>
  <rect x="190" y="220" width="140" height="15" rx="3" fill="#ffffff" opacity="0.6"/>
  
  <!-- Charts -->
  <rect x="400" y="130" width="220" height="120" rx="8" fill="#1e293b"/>
  <circle cx="450" cy="190" r="30" fill="none" stroke="url(#secondaryGradient)" stroke-width="6"/>
  <circle cx="450" cy="190" r="30" fill="none" stroke="url(#accentGradient)" stroke-width="6" stroke-dasharray="70 30" stroke-linecap="round"/>
  
  <!-- Bar chart -->
  <rect x="500" y="200" width="15" height="40" fill="url(#primaryGradient)"/>
  <rect x="520" y="180" width="15" height="60" fill="url(#secondaryGradient)"/>
  <rect x="540" y="190" width="15" height="50" fill="url(#accentGradient)"/>
  <rect x="560" y="170" width="15" height="70" fill="url(#primaryGradient)"/>
  <rect x="580" y="185" width="15" height="55" fill="url(#secondaryGradient)"/>
  
  <!-- Bottom panels -->
  <rect x="180" y="270" width="130" height="80" rx="8" fill="#0f172a"/>
  <rect x="190" y="280" width="110" height="8" rx="4" fill="url(#primaryGradient)"/>
  <rect x="190" y="295" width="80" height="6" rx="3" fill="#64748b"/>
  <rect x="190" y="308" width="60" height="6" rx="3" fill="#64748b"/>
  <rect x="190" y="321" width="90" height="6" rx="3" fill="#64748b"/>
  
  <rect x="330" y="270" width="130" height="80" rx="8" fill="#0f172a"/>
  <rect x="340" y="280" width="110" height="8" rx="4" fill="url(#secondaryGradient)"/>
  <rect x="340" y="295" width="70" height="6" rx="3" fill="#64748b"/>
  <rect x="340" y="308" width="85" height="6" rx="3" fill="#64748b"/>
  <rect x="340" y="321" width="75" height="6" rx="3" fill="#64748b"/>
  
  <rect x="480" y="270" width="130" height="80" rx="8" fill="#0f172a"/>
  <rect x="490" y="280" width="110" height="8" rx="4" fill="url(#accentGradient)"/>
  <rect x="490" y="295" width="95" height="6" rx="3" fill="#64748b"/>
  <rect x="490" y="308" width="65" height="6" rx="3" fill="#64748b"/>
  <rect x="490" y="321" width="100" height="6" rx="3" fill="#64748b"/>
  
  <!-- Floating elements -->
  <!-- AI Brain -->
  <circle cx="100" cy="200" r="40" fill="url(#primaryGradient)" opacity="0.9"/>
  <circle cx="90" cy="190" r="8" fill="#ffffff"/>
  <circle cx="110" cy="190" r="8" fill="#ffffff"/>
  <circle cx="100" cy="210" r="12" fill="#ffffff"/>
  <path d="M 85 215 Q 100 225 115 215" stroke="#ffffff" stroke-width="2" fill="none"/>
  
  <!-- Gears -->
  <circle cx="720" cy="150" r="25" fill="none" stroke="url(#secondaryGradient)" stroke-width="4"/>
  <circle cx="720" cy="150" r="15" fill="none" stroke="url(#secondaryGradient)" stroke-width="2"/>
  <rect x="715" y="125" width="10" height="10" fill="url(#secondaryGradient)"/>
  <rect x="715" y="165" width="10" height="10" fill="url(#secondaryGradient)"/>
  <rect x="695" y="145" width="10" height="10" fill="url(#secondaryGradient)"/>
  <rect x="735" y="145" width="10" height="10" fill="url(#secondaryGradient)"/>
  
  <!-- Network nodes -->
  <circle cx="650" cy="400" r="20" fill="url(#accentGradient)" opacity="0.8"/>
  <circle cx="700" cy="420" r="15" fill="url(#primaryGradient)" opacity="0.8"/>
  <circle cx="680" cy="450" r="12" fill="url(#secondaryGradient)" opacity="0.8"/>
  <line x1="650" y1="400" x2="700" y2="420" stroke="url(#primaryGradient)" stroke-width="2" opacity="0.6"/>
  <line x1="700" y1="420" x2="680" y2="450" stroke="url(#secondaryGradient)" stroke-width="2" opacity="0.6"/>
  <line x1="680" y1="450" x2="650" y2="400" stroke="url(#accentGradient)" stroke-width="2" opacity="0.6"/>
  
  <!-- Data visualization -->
  <rect x="50" y="450" width="200" height="100" rx="10" fill="#1e293b" opacity="0.9"/>
  <rect x="60" y="460" width="180" height="15" rx="3" fill="url(#primaryGradient)" opacity="0.7"/>
  <rect x="60" y="480" width="140" height="10" rx="2" fill="#64748b"/>
  <rect x="60" y="495" width="160" height="10" rx="2" fill="#64748b"/>
  <rect x="60" y="510" width="120" height="10" rx="2" fill="#64748b"/>
  <rect x="60" y="525" width="170" height="10" rx="2" fill="#64748b"/>
  
  <!-- Floating icons -->
  <!-- Analytics icon -->
  <circle cx="750" cy="300" r="30" fill="url(#primaryGradient)" opacity="0.1"/>
  <path d="M 735 295 L 745 285 L 755 295 L 765 285" stroke="url(#primaryGradient)" stroke-width="3" fill="none" stroke-linecap="round"/>
  <circle cx="738" cy="295" r="2" fill="url(#primaryGradient)"/>
  <circle cx="748" cy="285" r="2" fill="url(#primaryGradient)"/>
  <circle cx="758" cy="295" r="2" fill="url(#primaryGradient)"/>
  
  <!-- Process automation -->
  <rect x="60" y="50" width="80" height="60" rx="8" fill="url(#secondaryGradient)" opacity="0.1"/>
  <rect x="70" y="60" width="15" height="15" rx="3" fill="url(#secondaryGradient)"/>
  <rect x="90" y="60" width="15" height="15" rx="3" fill="url(#secondaryGradient)"/>
  <rect x="110" y="60" width="15" height="15" rx="3" fill="url(#secondaryGradient)"/>
  <path d="M 80 75 L 80 85 L 100 85 L 100 75" stroke="url(#secondaryGradient)" stroke-width="2" fill="none"/>
  <path d="M 100 75 L 100 85 L 120 85 L 120 75" stroke="url(#secondaryGradient)" stroke-width="2" fill="none"/>
  
  <!-- Particles/dots -->
  <circle cx="300" cy="50" r="3" fill="url(#accentGradient)" opacity="0.6"/>
  <circle cx="320" cy="70" r="2" fill="url(#primaryGradient)" opacity="0.5"/>
  <circle cx="340" cy="45" r="2" fill="url(#secondaryGradient)" opacity="0.7"/>
  <circle cx="580" cy="80" r="3" fill="url(#accentGradient)" opacity="0.5"/>
  <circle cx="600" cy="60" r="2" fill="url(#primaryGradient)" opacity="0.6"/>
  
  <circle cx="80" cy="380" r="2" fill="url(#secondaryGradient)" opacity="0.6"/>
  <circle cx="120" cy="360" r="3" fill="url(#accentGradient)" opacity="0.5"/>
  <circle cx="700" cy="520" r="2" fill="url(#primaryGradient)" opacity="0.7"/>
  <circle cx="720" cy="540" r="3" fill="url(#secondaryGradient)" opacity="0.5"/>
  
  <!-- Success metrics -->
  <rect x="550" y="450" width="120" height="80" rx="8" fill="#065f46" opacity="0.1"/>
  <circle cx="580" cy="470" r="8" fill="#10b981"/>
  <path d="M 576 470 L 579 473 L 584 468" stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round"/>
  <text x="595" y="475" font-family="Arial, sans-serif" font-size="12" fill="#10b981" font-weight="bold">+300% ROI</text>
  
  <circle cx="580" cy="495" r="8" fill="#10b981"/>
  <path d="M 576 495 L 579 498 L 584 493" stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round"/>
  <text x="595" y="500" font-family="Arial, sans-serif" font-size="12" fill="#10b981" font-weight="bold">-50% Tempo</text>
  
  <circle cx="580" cy="520" r="8" fill="#10b981"/>
  <path d="M 576 520 L 579 523 L 584 518" stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round"/>
  <text x="595" y="525" font-family="Arial, sans-serif" font-size="12" fill="#10b981" font-weight="bold">98% Satisfação</text>
</svg>